version: '3.8'

# Production environment
# Run: docker-compose -f docker-compose.prod.yml up -d

services:
  # Infrastructure Services
  mysql:
    image: mysql:8.0
    container_name: hypermall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hypermall-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: hypermall-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hypermall-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hypermall-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - hypermall-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: hypermall-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - hypermall-network
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # Core Services
  service-registry:
    build:
      context: ../../backend/service-registry
      dockerfile: Dockerfile
    container_name: hypermall-service-registry
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - hypermall-network
    healthcheck:
      test: curl -s http://localhost:8761/actuator/health | grep UP || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  config-server:
    build:
      context: ../../backend/config-server
      dockerfile: Dockerfile
    container_name: hypermall-config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_URI=http://eureka:eureka123@service-registry:8761/eureka/
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - hypermall-network
    healthcheck:
      test: curl -s http://localhost:8888/actuator/health | grep UP || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  api-gateway:
    build:
      context: ../../backend/api-gateway
      dockerfile: Dockerfile
    container_name: hypermall-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_URI=http://eureka:eureka123@service-registry:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hypermall-network
    healthcheck:
      test: curl -s http://localhost:8080/actuator/health | grep UP || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # Business Services
  user-service:
    build:
      context: ../../backend/user-service
      dockerfile: Dockerfile
    container_name: hypermall-user-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_URI=http://eureka:eureka123@service-registry:8761/eureka/
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hypermall-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  product-service:
    build:
      context: ../../backend/product-service
      dockerfile: Dockerfile
    container_name: hypermall-product-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_URI=http://eureka:eureka123@service-registry:8761/eureka/
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - hypermall-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  order-service:
    build:
      context: ../../backend/order-service
      dockerfile: Dockerfile
    container_name: hypermall-order-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_URI=http://eureka:eureka123@service-registry:8761/eureka/
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hypermall-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  # Frontend
  frontend:
    build:
      context: ../../frontend/hypermall-web
      dockerfile: Dockerfile
    container_name: hypermall-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - hypermall-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:

networks:
  hypermall-network:
    driver: bridge
