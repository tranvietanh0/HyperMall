version: '3.8'

# Use this when you have MySQL and Redis running locally
# Only starts RabbitMQ and Elasticsearch

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hypermall-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - hypermall-dev

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: hypermall-elasticsearch-dev
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    networks:
      - hypermall-dev

networks:
  hypermall-dev:
    driver: bridge
