input {
  tcp {
    port => 5000
    codec => json_lines
  }
  udp {
    port => 5000
    codec => json_lines
  }
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed_json"
    }
  }

  # Parse Spring Boot logs
  if [parsed_json][logger_name] {
    mutate {
      add_field => {
        "service" => "%{[parsed_json][logger_name]}"
        "level" => "%{[parsed_json][level]}"
      }
    }
  }

  # Parse timestamp
  date {
    match => ["[parsed_json][@timestamp]", "ISO8601"]
    target => "@timestamp"
  }

  # Add service name from MDC if available
  if [parsed_json][mdc][service] {
    mutate {
      add_field => { "service_name" => "%{[parsed_json][mdc][service]}" }
    }
  }

  # Extract trace ID for distributed tracing
  if [parsed_json][mdc][traceId] {
    mutate {
      add_field => { "trace_id" => "%{[parsed_json][mdc][traceId]}" }
    }
  }

  # Geoip for client IP (if available)
  if [parsed_json][client_ip] {
    geoip {
      source => "[parsed_json][client_ip]"
      target => "geoip"
    }
  }

  # Remove parsed_json after extracting fields
  mutate {
    remove_field => ["parsed_json"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch-logs:9200"]
    index => "hypermall-logs-%{+YYYY.MM.dd}"
  }

  # Debug output (disable in production)
  # stdout {
  #   codec => rubydebug
  # }
}
