global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  # - "alert.rules"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot Actuator endpoints
  - job_name: 'spring-boot-services'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets:
          - 'host.docker.internal:8080'  # api-gateway
          - 'host.docker.internal:8081'  # user-service
          - 'host.docker.internal:8082'  # product-service
          - 'host.docker.internal:8083'  # cart-service
          - 'host.docker.internal:8084'  # order-service
          - 'host.docker.internal:8085'  # payment-service
          - 'host.docker.internal:8086'  # inventory-service
          - 'host.docker.internal:8087'  # shipping-service
          - 'host.docker.internal:8088'  # promotion-service
          - 'host.docker.internal:8089'  # review-service
          - 'host.docker.internal:8090'  # search-service
          - 'host.docker.internal:8091'  # notification-service
          - 'host.docker.internal:8093'  # media-service
          - 'host.docker.internal:8094'  # seller-service
          - 'host.docker.internal:8095'  # analytics-service
        labels:
          application: 'hypermall'

  # Eureka Server
  - job_name: 'eureka'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8761']
        labels:
          application: 'service-registry'

  # Config Server
  - job_name: 'config-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8888']
        labels:
          application: 'config-server'

  # MySQL Exporter (if enabled)
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  # Redis Exporter (if enabled)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # RabbitMQ
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['host.docker.internal:15692']
