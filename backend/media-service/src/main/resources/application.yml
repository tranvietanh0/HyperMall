spring:
  application:
    name: media-service
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      username: config
      password: config123
      fail-fast: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka123@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

media:
  storage:
    local:
      path: ./uploads
      base-url: http://localhost:8093/api/media/files
  upload:
    max-size: 10485760
    thumbnail-width: 300
    thumbnail-height: 300

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.hypermall.media: DEBUG
    org.springframework.security: DEBUG
