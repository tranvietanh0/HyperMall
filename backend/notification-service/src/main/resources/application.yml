server:
  port: 8091

spring:
  application:
    name: notification-service

  config:
    import: configserver:${CONFIG_SERVER_URI:http://${CONFIG_SERVER_USERNAME}:${CONFIG_SERVER_PASSWORD}@localhost:8888}

  cloud:
    config:
      fail-fast: true

  datasource:
    url: jdbc:mysql://localhost:3306/hypermall_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: ${JWT_SECRET}

rabbitmq:
  queue:
    notification: notification-queue
  exchange:
    notification: notification-exchange
  routing-key:
    notification: notification.#

notification:
  email:
    enabled: ${EMAIL_ENABLED:false}
  sms:
    enabled: ${SMS_ENABLED:false}
    provider: ${SMS_PROVIDER:stringee}
    api-key: ${SMS_API_KEY:}
    api-secret: ${SMS_API_SECRET:}
    sender: HyperMall
  push:
    enabled: ${PUSH_ENABLED:false}
    firebase:
      server-key: ${FIREBASE_SERVER_KEY:}
      api-url: https://fcm.googleapis.com/fcm/send

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.hypermall.notification: DEBUG
    org.springframework.amqp: INFO
