server:
  port: 8083

spring:
  application:
    name: cart-service
  config:
    import: configserver:${CONFIG_SERVER_URI:http://${CONFIG_SERVER_USERNAME}:${CONFIG_SERVER_PASSWORD}@localhost:8888}
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 3
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET}
  cart:
    max-items: 50
    item-expiration-days: 30

logging:
  level:
    com.hypermall: DEBUG
