server:
  port: ${MEDIA_SERVICE_PORT:8093}

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/hypermall_media?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

app:
  jwt:
    secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckp3dFRva2VuR2VuZXJhdGlvbjEyMzQ1Njc4OTAxMjM0NTY3ODkw}

media:
  storage:
    provider: ${MEDIA_STORAGE_PROVIDER:local}
    local:
      path: ${MEDIA_STORAGE_PATH:./uploads}
      base-url: ${MEDIA_BASE_URL:http://localhost:8093/api/media/files}
    s3:
      bucket: ${AWS_S3_BUCKET:}
      region: ${AWS_REGION:ap-southeast-1}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
