server:
  port: ${ORDER_SERVICE_PORT:8084}

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/hypermall_order?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# Order configuration
app:
  order:
    payment-timeout-minutes: 30
    auto-cancel-after-hours: 24
    auto-complete-after-days: 7
