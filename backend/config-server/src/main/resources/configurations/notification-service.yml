server:
  port: ${NOTIFICATION_SERVICE_PORT:8091}

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/hypermall_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

app:
  jwt:
    secret: ${JWT_SECRET}

rabbitmq:
  queue:
    notification: notification-queue
  exchange:
    notification: notification-exchange
  routing-key:
    notification: notification.#

notification:
  email:
    enabled: ${EMAIL_ENABLED:false}
  sms:
    enabled: ${SMS_ENABLED:false}
    provider: ${SMS_PROVIDER:stringee}
    api-key: ${SMS_API_KEY:}
    api-secret: ${SMS_API_SECRET:}
    sender: HyperMall
  push:
    enabled: ${PUSH_ENABLED:false}
    firebase:
      server-key: ${FIREBASE_SERVER_KEY:}
      api-url: https://fcm.googleapis.com/fcm/send

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
