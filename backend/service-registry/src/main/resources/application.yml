server:
  port: ${EUREKA_PORT:8761}

spring:
  application:
    name: service-registry
  security:
    user:
      name: ${EUREKA_USERNAME:eureka}
      password: ${EUREKA_PASSWORD:eureka123}

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    prefer-ip-address: true
  client:
    # Don't register itself as a client
    register-with-eureka: false
    # Don't fetch registry (standalone mode)
    fetch-registry: false
    service-url:
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Disable self-preservation mode in development
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:false}
    # Faster cleanup of unavailable services
    eviction-interval-timer-in-ms: 5000
    # Response cache update interval
    response-cache-update-interval-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
