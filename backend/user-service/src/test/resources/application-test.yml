spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: dGVzdC1qd3Qtc2VjcmV0LWtleS1mb3ItdW5pdC10ZXN0cy1taW5pbXVtLTI1Ni1iaXRzLXJlcXVpcmVkLWhlcmU=
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

eureka:
  client:
    enabled: false

logging:
  level:
    root: WARN
    com.hypermall: DEBUG
